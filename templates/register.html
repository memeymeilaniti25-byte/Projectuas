<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar — To-Do List</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/variables.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body>
<main class="page">
  <div class="auth-card">
    <p class="auth-eyebrow">MEJA BELAJAR DIGITAL</p>
    <h1 class="auth-title">Buat Akun</h1>

    {% if error %}
    <div class="auth-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('main.register_page') }}">
      <div class="auth-field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required minlength="3" autofocus autocomplete="username">
      </div>
      <div class="auth-field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required minlength="6" autocomplete="new-password">
      </div>
      <div class="auth-field">
        <label for="confirm">Ulangi Password</label>
        <input type="password" id="confirm" name="confirm" required minlength="6" autocomplete="new-password">
      </div>
      <button type="submit" class="btn-add auth-submit">Daftar</button>
    </form>

    <p class="auth-switch">Sudah punya akun? <a href="{{ url_for('main.login_page') }}">Masuk di sini</a></p>
  </div>
</main>
</body>
</html>
